<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bus service BLG</title>
    
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/pmtiles@2.11.0/dist/index.js"></script>

    <style>
        :root {
            --primary: #22df14;
            --secondary: #87d620;
            --text-main: #ffffff;
            --text-sub: #000000;
            --card-bg: #051019;
            --nav-bg: #ffffff;
            --border: #87d620;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--secondary);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Fixed Image Scaling - No Zoom */
        .hero { 
            overflow: hidden; 
            position: relative;
            width:100%
            background: #000;
        }
        .hero-img { 
            width: 100%; 
            //height: 100%; 
            object-fit: contain; /* Keeps original size without cropping/zooming */
            background-color: var(--card-bg);
        }

        #main-content {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            padding-bottom: 80px;
        }

        .page { display: none; height: 100%; }
        .page.active { display: block; }

        .card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .search-group {
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }
        
        .search-group label {
            display: block;
            font-size: 11px;
            color: var(--primary);
            font-weight: bold;
            margin-bottom: 2px;
        }
        
        .search-group select {
            width: 100%;
            border: none;
            font-size: 16px;
            padding: 8px 0;
            outline: none;
            background: transparent;
            color: var(--text-main);
        }

        #main-search-btn {
            width: 100%;
            background-color: var(--primary);
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Map Container */
        #map-page { height: 100%; width: 100%; position: relative; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; height: 100%; }

        /* Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: transparent;
            border-top: none;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
            user-select: none;
            color:grey;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-sub);
            background: none;
            border: none;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        .nav-item.active { color: white; }
        .nav-icons { height: 28px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <section id="search-page" class="page active">
        <div class="hero">
            <img src="./Bus Servie_files/hero.png" alt="Bus" class="hero-img">
        </div>
        <div id="main-content">
            <div class="card">
                <div class="search-group">
                    <label>ROUTE</label>
                    <select id="route-select"></select>
                </div>
                <div class="search-group">
                    <label>FROM</label>
                    <select id="from-select"></select>
                </div>
                <div class="search-group">
                    <label>TO</label>
                    <select id="to-select"></select>
                </div>
                <button id="main-search-btn">SEARCH BUSES</button>
            </div>
        </div>
    </section>

    <section id="map-page" class="page">
        <div id="map"></div>
    </section>

    <section id="saved-page" class="page">
        <div id="main-content"><div class="card"><h2>Saved Routes</h2></div></div>
    </section>
    <section id="settings-page" class="page">
        <div id="main-content"><div class="card"><h2>Settings</h2></div></div>
    </section>

    <nav class="bottom-nav" id="bottom-nav">
        <button class="nav-item active" onclick="showPage('search-page', this)">
            <img class="nav-icons" src="./Bus Servie_files/bus.png"><span>Search</span>
        </button>
        <button class="nav-item" onclick="showPage('map-page', this)">
            <img class="nav-icons" src="./Bus Servie_files/map.png"><span>Map</span>
        </button>
        <button class="nav-item" onclick="showPage('saved-page', this)">
            <img class="nav-icons" src="./Bus Servie_files/saved.png"><span>Saved</span>
        </button>
        <button class="nav-item" onclick="showPage('settings-page', this)">
            <img class="nav-icons" src="./Bus Servie_files/settings.png"><span>Settings</span>
        </button>
    </nav>

    <script>
        // --- DOUBLE TAP FULLSCREEN ON NAV BAR ---
        const navBar = document.getElementById('bottom-nav');
        let lastTap = 0;
        navBar.addEventListener('touchend', function(e) {
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTap;
            if (tapLength < 300 && tapLength > 0) {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => {});
                } else {
                    document.exitFullscreen();
                }
                e.preventDefault();
            }
            lastTap = currentTime;
        });

        // --- PAGE NAVIGATION ---
        function showPage(pageId, navEl) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            navEl.classList.add('active');

            if (pageId === 'map-page') {
                // Delay slightly to allow the container to become visible before initializing
                setTimeout(() => { 
                    if (!map) initMap(); 
                    else map.resize(); 
                }, 200);
            }
        }

        // --- MAPLIBRE + PMTILES (SHORTBREAD STYLE) ---
        let map;
        function initMap() {
            const protocol = new pmtiles.Protocol();
            maplibregl.addProtocol("pmtiles", protocol.tile);

            map = new maplibregl.Map({
                container: 'map',
                style: {
                    version: 8,
                    sources: {
                        "sri-lanka": {
                            type: "vector",
                            url: "pmtiles://sri-lanka.pmtiles",
                            attribution: '© OpenStreetMap contributors'
                        }
                    },
                    layers: [
                        { "id": "background", "type": "background", "paint": { "background-color": "#f0f0f0" } },
                        {
                            "id": "land",
                            "type": "fill",
                            "source": "sri-lanka",
                            "source-layer": "land",
                            "paint": { "fill-color": "#e0e0e0" }
                        },
                        {
                            "id": "water",
                            "type": "fill",
                            "source": "sri-lanka",
                            "source-layer": "water",
                            "paint": { "fill-color": "#a2daf2" }
                        },
                        {
                            "id": "streets",
                            "type": "line",
                            "source": "sri-lanka",
                            "source-layer": "streets",
                            "paint": {
                                "line-color": "#ffffff",
                                "line-width": ["interpolate", ["linear"], ["zoom"], 12, 1, 16, 5]
                            }
                        }
                    ]
                },
                center: [80.7000, 6.6500], // Balangoda area
                zoom: 12
            });

            map.addControl(new maplibregl.NavigationControl());
        }

        // --- DUMMY DATA SETUP ---
        const routeStops = { "Balangoda-Welioya": [{id:"BAL", name:"Balangoda"}, {id:"WEL", name:"Welioya"}] };
        const rSelect = document.getElementById('route-select');
        Object.keys(routeStops).forEach(r => rSelect.add(new Option(r, r)));
        
        function updateStops() {
            const f = document.getElementById('from-select');
            const t = document.getElementById('to-select');
            f.innerHTML = ''; t.innerHTML = '';
            routeStops[rSelect.value].forEach(s => {
                f.add(new Option(s.name, s.id));
                t.add(new Option(s.name, s.id));
            });
        }
        rSelect.onchange = updateStops;
        updateStops();
    </script>
</body>
</html>
